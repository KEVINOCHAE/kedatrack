{% extends 'base.html' %}

{% block title %}Delete Service{% endblock %}

{% block content %}
<h1>Delete Service: {{ service.name }}</h1>
<p>Are you sure you want to delete this service?</p>
<form method="POST">
    {{ form.hidden_tag() }}
    <button type="submit">Yes, Delete</button>
    <a href="{{ url_for('services.index') }}">Cancel</a>
</form>
{% endblock %}
